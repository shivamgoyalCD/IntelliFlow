server:
  port: ${PAYMENT_SERVICE_PORT:8083}

spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

intelliflow:
  payment:
    failure-rate: ${PAYMENT_FAILURE_RATE:5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
