server:
  port: ${ORDER_SERVICE_PORT:8081}

spring:
  application:
    name: order-service
  datasource:
    url: ${ORDER_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/intelliflow}
    username: ${ORDER_SERVICE_DB_USERNAME:intelliflow}
    password: ${ORDER_SERVICE_DB_PASSWORD:intelliflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${ORDER_SERVICE_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

intelliflow:
  payment-service:
    base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
