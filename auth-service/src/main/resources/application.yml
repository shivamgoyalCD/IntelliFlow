server:
  port: ${AUTH_SERVICE_PORT:8082}

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/intelliflow}
    username: ${AUTH_SERVICE_DB_USERNAME:intelliflow}
    password: ${AUTH_SERVICE_DB_PASSWORD:intelliflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${AUTH_SERVICE_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

intelliflow:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:intelliflow-auth-service}
      secret: ${AUTH_JWT_SECRET:intelliflow-local-development-secret-key-change-before-production-0001}
      access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
    local-user:
      username: ${AUTH_LOCAL_USERNAME:admin}
      password: ${AUTH_LOCAL_PASSWORD:admin123}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
