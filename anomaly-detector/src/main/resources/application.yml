server:
  port: ${ANOMALY_DETECTOR_PORT:8085}

spring:
  application:
    name: anomaly-detector
  datasource:
    url: ${ANOMALY_DETECTOR_DB_URL:jdbc:postgresql://localhost:5432/intelliflow}
    username: ${ANOMALY_DETECTOR_DB_USERNAME:intelliflow}
    password: ${ANOMALY_DETECTOR_DB_PASSWORD:intelliflow}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${ANOMALY_DETECTOR_FLYWAY_ENABLED:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${ANOMALY_DETECTOR_KAFKA_GROUP_ID:anomaly-detector}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

intelliflow:
  anomaly-detector:
    consumer:
      enabled: ${ANOMALY_DETECTOR_CONSUMER_ENABLED:true}
    rules:
      refresh-interval-ms: ${ANOMALY_DETECTOR_RULE_REFRESH_INTERVAL_MS:60000}
    publisher:
      timeout-seconds: ${ANOMALY_DETECTOR_PUBLISH_TIMEOUT_SECONDS:5}
    statistical:
      history-window-seconds: ${ANOMALY_DETECTOR_STATISTICAL_HISTORY_WINDOW_SECONDS:900}
      min-samples: ${ANOMALY_DETECTOR_STATISTICAL_MIN_SAMPLES:20}
      z-score-threshold: ${ANOMALY_DETECTOR_STATISTICAL_Z_SCORE_THRESHOLD:3}
    redis:
      metric-history-prefix: ${ANOMALY_DETECTOR_REDIS_METRIC_HISTORY_PREFIX:intelliflow:metrics}
    deduplication:
      key-prefix: ${ANOMALY_DETECTOR_DEDUPLICATION_KEY_PREFIX:intelliflow:alert-dedup}
      cooldown-seconds: ${ANOMALY_DETECTOR_DEDUPLICATION_COOLDOWN_SECONDS:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
